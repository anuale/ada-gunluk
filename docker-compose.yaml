services:
  ada-gunluk:
    image: ghcr.io/anuale/ada-gunluk:1ed5ad4
    pull_policy: always
    container_name: ada-gunluk
    expose:
      - "3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@ada-db:5432/ada_gunluk}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=https://ada.alnuai.com
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/login',r=>{process.exit(r.statusCode===200?0:1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ada-network
      - coolify
    depends_on:
      ada-db:
        condition: service_healthy

  ada-db:
    image: postgres:17-alpine
    container_name: ada-db
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "ada_gunluk"
    volumes:
      - ada-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ada-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ada-pgdata:

networks:
  ada-network:
    driver: bridge
  coolify:
    external: true
